{% extends "base.html" %}
{% block title %}Assignments{% endblock %}

{% block page_content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-9 col-sm-12 col-10">
                <h3>
                    <strong>SUMMARY</strong>
                </h3>
                <table class="table" id="summary">
                </table>

                <p id="daily-utilization">Daily Utilization: Loading...</p>

                <p><a href="#unmanaged" class="link-secondary text-decoration-none">Unmanaged Hosts</a></p>
                <p><a href="#faulty" class="link-secondary text-decoration-none">Faulty Hosts</a></p>

                <h3><strong>DETAILS</strong></h3>

                <div id="cloud-sections">
                    <!-- Cloud sections will be dynamically inserted here -->
                </div>

                <h3>
                    <a id="unmanaged"></a>
                    <strong>Unmanaged systems</strong>
                </h3>
                <table class="table" id="unmanaged_table">
                </table>

                <h3>
                    <a id="faulty"></a><strong>Faulty systems</strong>
                </h3>
                <table class="table" id="faulty_table">
                </table>

            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    {{ super() }}
    <script>
        function createLoadingIndicator() {
            return $('<div>')
                .addClass('loading-overlay')
                .append(
                    $('<div>')
                        .addClass('spinner-border spinner-border-sm text-secondary')
                        .attr('role', 'status')
                        .append($('<span>').addClass('visually-hidden').text('Loading...')),
                    $('<span>').addClass('ms-2').text('Loading data...')
                );
        };

        function createCloudSection(cloud) {
            const host_headers = {{ host_headers|tojson|safe }};

            return $('<div>').append([
                $('<h3>').append(
                    $('<span>')
                        .attr('id', cloud.name)
                        .append(
                            $('<strong>').text(
                                `${cloud.name} : ${cloud.count} (${cloud.description}) — ${cloud.owner}`
                            )
                        )
                ),
                $('<table>')
                    .addClass('table')
                    .addClass('cloud-table')
                    .attr('id', `hosts-${cloud.name}`)
                    .attr('data-cloud-id', `${cloud.name}`)
                    .append([
                        $('<thead>').append(
                            $('<tr>').append(
                                host_headers.map(header => 
                                    $('<th>').attr('scope', 'col').text(header)
                                )
                            )
                        ),
                        $('<tbody>').append(
                            $('<tr>').append(
                                $('<td>')
                                    .attr('colspan', host_headers.length)
                                    .addClass('text-center')
                                    .append($('<span>').addClass('loading-dots').text('Loading'))
                            )
                        )
                    ])
            ]);
        };

        const cloudRequests = {};

        function updateHostsForCloud(cloudName) {
            const $table = $(`#hosts-${cloudName}`);
            const host_headers = {{ host_headers|tojson|safe }};
                
            if ($table.find('thead').length === 0) {
                $table.append($('<thead>'));
            }
            if ($table.find('tbody').length === 0) {
                $table.append($('<tbody>'));
            }
            const $tbody = $table.find('tbody');

            $tbody.empty().append(
                $('<tr>').append(
                    $('<td>')
                        .attr('colspan', host_headers.length)
                        .append(createLoadingIndicator())
                )
            );

            // Abort any existing request for this cloud
            if (cloudRequests[cloudName]) {
                cloudRequests[cloudName].abort();
            }

            // Store the new AJAX request
            cloudRequests[cloudName] = $.ajax({
                url: `/managed/${cloudName}`,
                method: 'GET',
                async: true,
                success: function(data) {
                    $tbody.empty();
                    
                    if (!data || !data.hosts || data.hosts.length === 0) {
                        $tbody.append(
                            $('<tr>').append(
                                $('<td>')
                                    .attr('colspan', host_headers.length)
                                    .addClass('text-center')
                                    .text('No hosts found')
                            )
                        );
                        return;
                    }

                    data.hosts.forEach(host => {
                        $tbody.append(
                            $('<tr>').append([
                                $('<td>').text(host.short_name || `${host.name.split('.')[0]}`),
                                $('<td>').append(
                                    $('<a>')
                                        .addClass('link-secondary-hover')
                                        .attr('href', `http://mgmt-${host.name}/`)
                                        .attr('target', '_blank')
                                        .text('console')
                                ),
                                $('<td>').text(host.start_date || "∞"),
                                $('<td>').text(host.end_date || "∞"),
                                $('<td>').text(host.total_time || "∞"),
                                $('<td>').text(host.total_time_left || "∞")
                            ])
                        );
                    });
                },
                error: function(xhr, status, error) {
                    console.error(`Error fetching hosts for cloud ${cloudName}:`, error);
                    $tbody.html(
                        $('<tr>').append(
                            $('<td>')
                                .attr('colspan', host_headers.length)
                                .addClass('text-center text-danger')
                                .text('Error loading hosts')
                        )
                    );
                }
            });
        };

        $(window).on('beforeunload', function() {
            // Abort all cloud-specific requests
            for (const cloudName in cloudRequests) {
                if (cloudRequests[cloudName]) {
                    cloudRequests[cloudName].abort();
                }
            }
        });

        function updateSummaryData() {
            const $table = $(`#summary`);
            const headers = {{ headers|tojson|safe }};
            const ticket_url = "{{ ticket_url }}";
            const ticket_queue = "{{ ticket_queue }}";
                
            if ($table.find('thead').length === 0) {
                $table.append($('<thead>'));
                $table.find('thead').append(
                    $('<tr>').append(
                        headers.map(header =>
                            $('<th>').attr('scope', 'col').text(header)
                        )
                    )
                );
            }
            if ($table.find('tbody').length === 0) {
                $table.append($('<tbody>'));
            }
            const $tbody = $table.find('tbody');

            $tbody.empty().append(
                $('<tr>').append(
                    $('<td>')
                        .attr('colspan', headers.length)
                        .append(createLoadingIndicator())
                )
            );

            $.ajax({
                url: '/summary',
                method: 'GET',
                async: true,
                success: function(data) {
                    const $tbody = $table.find('tbody').empty();
                    
                    if (!data || data.length === 0) {
                        $tbody.append(
                            $('<tr>').append(
                                $('<td>')
                                    .attr('colspan', headers.length)
                                    .addClass('text-center')
                                    .text('No data available')
                            )
                        );
                        return;
                    }
        
                    $tbody.append(
                        data.map(cloud => 
                            $('<tr>').append([
                                // NAME
                                $('<td>').append(
                                    $('<a>')
                                        .addClass('link-success text-decoration-none')
                                        .attr('href', `#${cloud.name}`)
                                        .text(cloud.name)
                                ),
                                // SUMMARY
                                $('<td>').text(`${cloud.count} (${cloud.description})`),
                                // OWNER
                                $('<td>').text(cloud.owner),
                                // REQUEST
                                $('<td>').append(
                                    $('<a>')
                                        .addClass('link-secondary-hover text-decoration-none')
                                        .attr('href', `${ticket_url}/${ticket_queue}-${cloud.ticket}`)
                                        .attr('target', '_blank')
                                        .text(cloud.ticket)
                                ),
                                // STATUS
                                $('<td>').append(
                                    $('<span>').addClass('progress').css('margin-bottom', 0).append(
                                        $('<span>')
                                            .addClass(`progress-bar ${cloud.percent != 100 || !cloud.is_valid ? 'progress-bar-striped' : ''} ${
                                                cloud.percent < 15 ? 'bg-danger' : 
                                                cloud.percent != 100 || !cloud.is_valid ? 'bg-warning' : 
                                                'bg-primary'
                                            }`)
                                            .attr('role', 'progressbar')
                                            .css('width', `${cloud.percent}%`)
                                            .text(`${cloud.percent}%`)
                                    )
                                ),
                                // OSPENV
                                $('<td>').append(
                                    cloud.href_url_text_openstack ? 
                                        cloud.href_url_text_openstack.toLowerCase().includes('validating') ?
                                            $('<span>')
                                                .addClass(`${cloud.href_color} text-decoration-none`)
                                                .text(cloud.href_url_text_openstack)
                                        : $('<a>')
                                            .addClass(`${cloud.href_color} text-decoration-none`)
                                            .attr('href', cloud.href_url_openstack)
                                            .attr('target', cloud.is_valid ? '_blank' : '')
                                            .text(cloud.href_url_text_openstack)
                                        : ''
                                ),
                                // OCPINV
                                $('<td>').append(
                                    cloud.href_url_text_openshift ? 
                                        cloud.href_url_text_openshift.toLowerCase().includes('validating') ?
                                            $('<span>')
                                                .addClass(`${cloud.href_color} text-decoration-none`)
                                                .text(cloud.href_url_text_openshift)
                                        : $('<a>')
                                            .addClass(`${cloud.href_color} text-decoration-none`)
                                            .attr('href', cloud.href_url_openshift)
                                            .attr('target', cloud.is_valid ? '_blank' : '')
                                            .text(cloud.href_url_text_openshift)
                                        : ''
                                )
                            ])
                        )
                    );

                    // Create cloud sections
                    const $cloudContainer = $('#cloud-sections').empty();
                    data.forEach(cloud => {
                        $cloudContainer.append(createCloudSection(cloud));
                    });

                    const observerOptions = {
                        root: null, // Use the viewport as the root
                        rootMargin: '0px',
                        threshold: 0.1 // Trigger when 10% of the element is visible
                    };

                    const observer = new IntersectionObserver((entries, observer) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const cloudName = entry.target.getAttribute('data-cloud-id');
                                updateHostsForCloud(cloudName);
                                observer.unobserve(entry.target);
                            }
                        });
                    }, observerOptions);

                    $('.cloud-table').each(function() {
                        observer.observe(this);
                    });
                },
                error: function(xhr, status, error) {
                    console.error('Error fetching summary data:', error);
                    $table.find('tbody').empty().append(
                        $('<tr>').append(
                            $('<td>')
                                .attr('colspan', headers.length)
                                .addClass('text-center text-danger')
                                .text('Error loading data')
                        )
                    );
                }
            });
        };

        function updateDailyUtilization() {
            $.ajax({
                url: '/utilization',
                method: 'GET',
                async: true,
                success: function(data) {
                    $('#daily-utilization').text(`Daily Utilization: ${data}%`);
                },
                error: function(xhr, status, error) {
                    console.error('Error fetching daily utilization:', error);
                    $('#daily-utilization').text('Daily Utilization: Error loading data');
                }
            });
        };

        function updateUnmanagedHosts() {
            const $table = $('#unmanaged_table');
            const headers = {{ headers|tojson|safe }};
                
            if ($table.find('thead').length === 0) {
                $table.append($('<thead>'));
            }
            if ($table.find('tbody').length === 0) {
                $table.append($('<tbody>'));
            }
            const $tbody = $table.find('tbody');

            $tbody.empty().append(
                $('<tr>').append(
                    $('<td>')
                        .attr('colspan', headers.length)
                        .append(createLoadingIndicator())
                )
            );

            $.ajax({
                url: '/unmanaged',
                method: 'GET',
                async: true,
                success: function(data) {
                    $tbody.empty();
                    
                    if (!data || data.length === 0) {
                        $tbody.html('<tr><td colspan="2" class="text-center">No unmanaged hosts found</td></tr>');
                        return;
                    }

                    data.forEach(host => {
                        $tbody.append(
                            $('<tr>').append([
                                $('<td>').text(host.short_name),
                                $('<td>').append(
                                    $('<a>')
                                        .addClass('link-secondary-hover')
                                        .attr('href', `http://mgmt-${host.name}/`)
                                        .attr('target', '_blank')
                                        .text('console')
                                )
                            ])
                        );
                    });
                },
                error: function(xhr, status, error) {
                    console.error('Error fetching unmanaged hosts:', error);
                    $tbody.html(
                        '<tr><td colspan="2" class="text-center text-danger">Error loading unmanaged hosts</td></tr>'
                    );
                }
            });
        };

        function updateFaultyHosts() {
            const $table = $('#faulty_table');
            const headers = {{ headers|tojson|safe }};
                
            if ($table.find('thead').length === 0) {
                $table.append($('<thead>'));
            }
            if ($table.find('tbody').length === 0) {
                $table.append($('<tbody>'));
            }
            const $tbody = $table.find('tbody');
            
            $tbody.empty().append(
                $('<tr>').append(
                    $('<td>')
                        .attr('colspan', headers.length)
                        .append(createLoadingIndicator())
                )
            );

            $.ajax({
                url: '/broken',
                method: 'GET',
                async: true,
                success: function(data) {
                    $tbody.empty();
                    
                    if (!data || data.length === 0) {
                        $tbody.html('<tr><td colspan="2" class="text-center">No faulty hosts found</td></tr>');
                        return;
                    }
        
                    data.forEach(host => {
                        $tbody.append(
                            $('<tr>').append([
                                $('<td>').text(host.name.split('.')[0]),
                                $('<td>').append(
                                    $('<a>')
                                        .addClass('link-secondary-hover')
                                        .attr('href', `http://mgmt-${host.name}/`)
                                        .attr('target', '_blank')
                                        .text('console')
                                )
                            ])
                        );
                    });
                },
                error: function(xhr, status, error) {
                    console.error('Error fetching faulty hosts:', error);
                    $tbody.html(
                        '<tr><td colspan="2" class="text-center text-danger">Error loading faulty hosts</td></tr>'
                    );
                }
            });
        }

        // Call updateSummaryData when document is ready
        $(document).ready(function() {
            updateSummaryData();
            updateDailyUtilization();
            updateUnmanagedHosts();
            updateFaultyHosts();
        });
    </script>
{% endblock %}
